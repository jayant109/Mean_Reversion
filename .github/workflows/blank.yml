  {
   "cell_type": "markdown",
   "id": "md-0",
   "metadata": {},
   "source": "# Mean Reversion Trading System\n### Z-Score Based Backtesting Framework\n\n---\n\n## Strategy Overview\n\nMean reversion exploits the statistical tendency of asset prices to return toward their historical average after deviating significantly.\nThis system quantifies that deviation using a **rolling z-score**:\n\n```\nz = (price - rolling_mean) / rolling_std\n```\n\n| Z-score | Interpretation | Action |\n|---------|---------------|--------|\n| < −2 | Price significantly below average | **Long entry** |\n| > +2 | Price significantly above average | **Short entry** |\n| Crosses 0 | Price reverted to mean | **Exit** |\n\n---\n\n## Notebook Structure\n\n| Section | What it covers |\n|---------|---------------|\n| **1. Setup** | Install libraries and imports |\n| **2. Configuration** | Set your ticker, dates, and parameters |\n| **3. Strategy** | Z-score signal generation |\n| **4. Backtest** | Event-driven trade simulation |\n| **5. Results** | Performance metrics |\n| **6. Dashboard** | 4-panel interactive chart |"
  },
  {
   "cell_type": "markdown",
   "id": "md-1",
   "metadata": {},
   "source": "---\n## Section 1 — Setup\n\nInstall and import all required libraries."
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "id": "cell-install",
   "metadata": {},
   "outputs": [],
   "source": "# Install dependencies (safe to re-run)\n!pip install yfinance pandas numpy matplotlib -q"
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "id": "cell-imports",
   "metadata": {},
   "outputs": [],
   "source": "import yfinance as yf\nimport pandas as pd\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport matplotlib.gridspec as gridspec\nimport warnings\n\nwarnings.filterwarnings('ignore')\n%matplotlib inline\n\nprint('All libraries loaded successfully.')"
  },
  {
   "cell_type": "markdown",
   "id": "md-4",
   "metadata": {},
   "source": "---\n## Section 2 — Configuration\n\n**Edit the parameters below** — this is the only cell you need to change to try a different stock, date range, or strategy setting.\n\n| Parameter | Description |\n|-----------|-------------|\n| `SYMBOL` | Any yfinance ticker — stocks, ETFs, or crypto |\n| `START_DATE` / `END_DATE` | Backtest period |\n| `WINDOW` | Rolling window in trading days (default 20 = 1 month) |\n| `Z_ENTRY` | How many std deviations from mean to trigger a trade |\n| `FEE` | Transaction cost per trade as a decimal (0.001 = 0.1%) |"
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "id": "cell-config",
   "metadata": {},
   "outputs": [],
   "source": "# ── EDIT THESE PARAMETERS ────────────────────────────────────\n\nSYMBOL     = 'AAPL'        # Try: 'MSFT', 'GOOGL', 'BTC-USD', 'SPY', 'TSLA'\nSTART_DATE = '2020-01-01'\nEND_DATE   = '2024-01-01'\nWINDOW     = 20            # Rolling window in trading days\nZ_ENTRY    = 2.0           # Z-score threshold to enter a trade\nFEE        = 0.001         # Transaction cost per trade (0.1%)\n\n# ─────────────────────────────────────────────────────────────\n\nprint(f'Symbol     : {SYMBOL}')\nprint(f'Period     : {START_DATE} to {END_DATE}')\nprint(f'Window     : {WINDOW} days')\nprint(f'Z-threshold: +/-{Z_ENTRY}')\nprint(f'Fee        : {FEE*100:.2f}% per trade')"
  },
  {
   "cell_type": "markdown",
   "id": "md-6",
   "metadata": {},
   "source": "---\n## Section 3 — Strategy: Z-Score Signal Generation\n\nThis section:\n1. Downloads historical price data from Yahoo Finance\n2. Computes the rolling mean and standard deviation\n3. Calculates the z-score at each bar\n4. Generates **crossover signals** — only fires on the exact bar where the z-score crosses the threshold, no forward-filling\n\n> **Why crossover signals?** Forward-filling a signal creates a persistent state that interferes with exit detection.\n> The backtester manages position state internally, so the strategy only emits a signal at the moment a condition is first met."
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "id": "cell-strategy",
   "metadata": {},
   "outputs": [],
   "source": "def fetch_data(symbol, start, end):\n    \"\"\"Download OHLCV data and return a clean single-column Close DataFrame.\"\"\"\n    raw = yf.download(symbol, start=start, end=end, progress=False)\n\n    if raw.empty:\n        raise ValueError(f'No data returned for {symbol}. Check ticker and date range.')\n\n    # yfinance sometimes returns MultiIndex columns\n    if isinstance(raw.columns, pd.MultiIndex):\n        raw.columns = ['_'.join(col).strip() for col in raw.columns]\n        close_col = f'Close_{symbol}'\n    else:\n        close_col = 'Close'\n\n    df = raw[[close_col]].copy()\n    df.rename(columns={close_col: 'Close'}, inplace=True)\n    return df\n\n\ndef compute_signals(df, window, z_entry):\n    \"\"\"Compute rolling z-score and generate crossover entry/exit signals.\"\"\"\n    df = df.copy()\n\n    # Rolling indicators\n    df['rolling_mean'] = df['Close'].rolling(window).mean()\n    df['rolling_std']  = df['Close'].rolling(window).std()\n    df = df.dropna().copy()\n\n    df['zscore'] = (df['Close'] - df['rolling_mean']) / df['rolling_std']\n\n    prev_z = df['zscore'].shift(1)\n\n    # Entry signals — crossover only, not level\n    long_entry  = (prev_z >= -z_entry) & (df['zscore'] < -z_entry)\n    short_entry = (prev_z <=  z_entry) & (df['zscore'] >  z_entry)\n\n    df['signal'] = 0\n    df.loc[long_entry,  'signal'] =  1   # Long\n    df.loc[short_entry, 'signal'] = -1   # Short\n\n    # Exit signals — when z-score crosses back through zero\n    long_exit  = (prev_z <= 0) & (df['zscore'] > 0)\n    short_exit = (prev_z >= 0) & (df['zscore'] < 0)\n\n    df['exit'] = 0\n    df.loc[long_exit | short_exit, 'exit'] = 1\n\n    return df\n\n\n# Run\nraw_df = fetch_data(SYMBOL, START_DATE, END_DATE)\ndf     = compute_signals(raw_df, WINDOW, Z_ENTRY)\n\nprint(f'Data loaded: {len(df)} trading days')\nprint(f'Date range : {df.index[0].date()} to {df.index[-1].date()}')\nprint(f'Long signals : {(df[\"signal\"] == 1).sum()}')\nprint(f'Short signals: {(df[\"signal\"] == -1).sum()}')\ndf.tail()"
  },
  {
   "cell_type": "markdown",
   "id": "md-8",
   "metadata": {},
   "source": "---\n## Section 4 — Backtest: Event-Driven Trade Simulation\n\nThe backtester loops through every bar and:\n- Opens a position when it sees an entry signal (and charges a fee)\n- Closes the position when it sees an exit signal (and charges a fee)\n- Tracks the running equity curve throughout\n\nThis is an **event-driven** approach — the position state is managed row by row, making the logic easy to follow and extend."
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "id": "cell-backtest",
   "metadata": {},
   "outputs": [],
   "source": "def run_backtest(df, fee):\n    \"\"\"Event-driven backtester. Returns results dict with equity curve and trades.\"\"\"\n    df          = df.copy()\n    position    = 0      #  0 = flat, 1 = long, -1 = short\n    entry_price = 0.0\n    equity      = 1.0\n    equity_curve = []\n    trades       = []\n\n    for i in range(len(df)):\n        price  = df['Close'].iloc[i]\n        signal = df['signal'].iloc[i]\n        exit_  = df['exit'].iloc[i]\n\n        # ── Entry ──────────────────────────────────────────────\n        if position == 0 and signal != 0:\n            position    = signal\n            entry_price = price\n            equity     *= (1 - fee)              # entry transaction cost\n            trades.append({\n                'type' : 'long' if signal == 1 else 'short',\n                'entry': price,\n                'index': i,\n            })\n\n        # ── Exit ───────────────────────────────────────────────\n        elif position != 0 and exit_:\n            pnl = (\n                (price - entry_price) / entry_price if position == 1\n                else (entry_price - price) / entry_price\n            )\n            equity *= (1 + pnl) * (1 - fee)     # realise PnL + exit cost\n            trades[-1].update({'exit': price, 'pnl_pct': round(pnl * 100, 3)})\n            position = 0\n\n        equity_curve.append(equity)\n\n    df['equity'] = equity_curve\n\n    closed   = [t for t in trades if 'pnl_pct' in t]\n    win_rate = (\n        sum(1 for t in closed if t['pnl_pct'] > 0) / len(closed) * 100\n        if closed else 0\n    )\n\n    return {'df': df, 'trades': trades, 'n_trades': len(closed), 'win_rate': win_rate}\n\n\n# Run\nresults = run_backtest(df, FEE)\n\nprint(f'Backtest complete.')\nprint(f'Closed trades: {results[\"n_trades\"]}')\nprint(f'Win rate     : {results[\"win_rate\"]:.1f}%')"
  },
  {
   "cell_type": "markdown",
   "id": "md-10",
   "metadata": {},
   "source": "---\n## Section 5 — Performance Metrics\n\nKey metrics used to evaluate the strategy:\n\n- **Total Return** — overall profit/loss over the backtest period\n- **Sharpe Ratio** — return per unit of risk (annualised). Above 1.0 is considered good\n- **Max Drawdown** — largest peak-to-trough decline. Measures downside risk\n- **Win Rate** — percentage of trades that were profitable\n- **Avg Win / Avg Loss** — average size of winning vs losing trades"
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "id": "cell-metrics",
   "metadata": {},
   "outputs": [],
   "source": "def print_metrics(results):\n    df     = results['df']\n    trades = results['trades']\n    closed = [t for t in trades if 'pnl_pct' in t]\n\n    equity       = df['equity']\n    returns      = equity.pct_change().dropna()\n    total_return = equity.iloc[-1] - 1\n    sharpe       = (np.sqrt(252) * returns.mean() / returns.std()\n                    if returns.std() > 0 else 0)\n    roll_max     = equity.cummax()\n    max_drawdown = ((equity - roll_max) / roll_max).min()\n    avg_win      = np.mean([t['pnl_pct'] for t in closed if t['pnl_pct'] > 0]) if closed else 0\n    avg_loss     = np.mean([t['pnl_pct'] for t in closed if t['pnl_pct'] < 0]) if closed else 0\n\n    print(f'{\"-\"*42}')\n    print(f'  PERFORMANCE SUMMARY  —  {SYMBOL}')\n    print(f'{\"-\"*42}')\n    print(f'  Total Return   : {total_return*100:>8.2f}%')\n    print(f'  Sharpe Ratio   : {sharpe:>8.2f}')\n    print(f'  Max Drawdown   : {max_drawdown*100:>8.2f}%')\n    print(f'{\"-\"*42}')\n    print(f'  Trades         : {results[\"n_trades\"]:>8}')\n    print(f'  Win Rate       : {results[\"win_rate\"]:>8.1f}%')\n    print(f'  Avg Win        : {avg_win:>8.2f}%')\n    print(f'  Avg Loss       : {avg_loss:>8.2f}%')\n    print(f'{\"-\"*42}')\n\n\nprint_metrics(results)"
  },
  {
   "cell_type": "markdown",
   "id": "md-12",
   "metadata": {},
   "source": "---\n### Trade Log\n\nFull list of every closed trade with entry price, exit price, and PnL."
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "id": "cell-tradelog",
   "metadata": {},
   "outputs": [],
   "source": "closed_trades = [t for t in results['trades'] if 'pnl_pct' in t]\n\nif closed_trades:\n    trade_df = pd.DataFrame(closed_trades)[['type', 'entry', 'exit', 'pnl_pct']]\n    trade_df.columns = ['Direction', 'Entry Price', 'Exit Price', 'PnL %']\n    trade_df.index = range(1, len(trade_df) + 1)\n    trade_df['PnL %'] = trade_df['PnL %'].apply(\n        lambda x: f'+{x:.2f}%' if x > 0 else f'{x:.2f}%'\n    )\n    trade_df\nelse:\n    print('No closed trades in this period.')"
  },
  {
   "cell_type": "markdown",
   "id": "md-14",
   "metadata": {},
   "source": "---\n## Section 6 — Dashboard\n\n4-panel chart showing:\n1. **Price + Moving Average** with buy/sell/exit markers\n2. **Z-score** with entry thresholds highlighted\n3. **Equity curve** — how your portfolio grew over time\n4. **Per-trade PnL** — bar chart of every trade result"
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "id": "cell-dashboard",
   "metadata": {},
   "outputs": [],
   "source": "plt.style.use('dark_background')\n\nCOLORS = {\n    'price'    : '#00BFFF',\n    'ma'       : '#FFA500',\n    'equity'   : '#DA70D6',\n    'buy'      : '#00FF7F',\n    'sell'     : '#FF4500',\n    'exit'     : '#FFD700',\n    'zscore'   : '#87CEEB',\n    'threshold': '#FF6347',\n    'zero'     : '#888888',\n}\n\nres_df = results['df']\ntrades = results['trades']\nclosed = [t for t in trades if 'pnl_pct' in t]\n\nlong_idx = [t['index'] for t in trades if t['type'] == 'long']\nshrt_idx = [t['index'] for t in trades if t['type'] == 'short']\nexit_idx = [t['index'] for t in closed]\n\nfig = plt.figure(figsize=(16, 14))\nfig.patch.set_facecolor('#0d0d0d')\ngs  = gridspec.GridSpec(4, 1, figure=fig, hspace=0.55,\n                        height_ratios=[2.5, 1.5, 2, 1.5])\n\nax_price  = fig.add_subplot(gs[0])\nax_zscore = fig.add_subplot(gs[1], sharex=ax_price)\nax_equity = fig.add_subplot(gs[2])\nax_pnl    = fig.add_subplot(gs[3])\n\nfor ax in [ax_price, ax_zscore, ax_equity, ax_pnl]:\n    ax.set_facecolor('#111111')\n    ax.tick_params(colors='#aaaaaa', labelsize=8)\n    for spine in ax.spines.values():\n        spine.set_edgecolor('#333333')\n\n# Panel 1: Price + MA + trade markers\nax_price.plot(df.index, df['Close'],        color=COLORS['price'], lw=1.2, label='Price')\nax_price.plot(df.index, df['rolling_mean'], color=COLORS['ma'],    lw=1.0, linestyle='--',\n              alpha=0.85, label=f'{WINDOW}d Rolling Mean')\nif long_idx:\n    ax_price.scatter(df.iloc[long_idx].index, df.iloc[long_idx]['Close'],\n                     marker='^', color=COLORS['buy'],  s=90, zorder=5, label='Long entry')\nif shrt_idx:\n    ax_price.scatter(df.iloc[shrt_idx].index, df.iloc[shrt_idx]['Close'],\n                     marker='v', color=COLORS['sell'], s=90, zorder=5, label='Short entry')\nif exit_idx:\n    ax_price.scatter(df.iloc[exit_idx].index, df.iloc[exit_idx]['Close'],\n                     marker='o', color=COLORS['exit'], s=60, zorder=5, label='Exit')\nax_price.set_ylabel('Price (USD)', color='#aaaaaa', fontsize=9)\nax_price.set_title(f'Mean Reversion Trading System  —  {SYMBOL}',\n                   color='white', fontsize=13, pad=10)\nax_price.legend(fontsize=8, loc='upper left', facecolor='#1a1a1a',\n                edgecolor='#444', labelcolor='white')\nax_price.grid(alpha=0.1)\n\n# Panel 2: Z-score\nax_zscore.plot(df.index, df['zscore'], color=COLORS['zscore'], lw=1.0, label='Z-score')\nax_zscore.axhline( Z_ENTRY,  color=COLORS['threshold'], lw=0.8, linestyle='--',\n                   label=f'+-{Z_ENTRY} threshold')\nax_zscore.axhline(-Z_ENTRY,  color=COLORS['threshold'], lw=0.8, linestyle='--')\nax_zscore.axhline(0,         color=COLORS['zero'],      lw=0.6, linestyle=':')\nax_zscore.fill_between(df.index, df['zscore'], 0,\n                       where=(df['zscore'] < -Z_ENTRY), alpha=0.2, color=COLORS['buy'])\nax_zscore.fill_between(df.index, df['zscore'], 0,\n                       where=(df['zscore'] >  Z_ENTRY), alpha=0.2, color=COLORS['sell'])\nax_zscore.set_ylabel('Z-score', color='#aaaaaa', fontsize=9)\nax_zscore.legend(fontsize=8, loc='upper left', facecolor='#1a1a1a',\n                 edgecolor='#444', labelcolor='white')\nax_zscore.grid(alpha=0.1)\n\n# Panel 3: Equity curve\nax_equity.plot(res_df.index, res_df['equity'],\n               color=COLORS['equity'], lw=1.5, label='Equity Curve')\nax_equity.axhline(1.0, color='#555', lw=0.8, linestyle=':')\nax_equity.fill_between(res_df.index, res_df['equity'], 1.0,\n                       where=(res_df['equity'] >= 1.0), alpha=0.15, color=COLORS['buy'])\nax_equity.fill_between(res_df.index, res_df['equity'], 1.0,\n                       where=(res_df['equity'] <  1.0), alpha=0.15, color=COLORS['sell'])\nax_equity.set_ylabel('Equity (normalised)', color='#aaaaaa', fontsize=9)\nax_equity.legend(fontsize=8, loc='upper left', facecolor='#1a1a1a',\n                 edgecolor='#444', labelcolor='white')\nax_equity.grid(alpha=0.1)\n\n# Panel 4: Per-trade PnL\nif closed:\n    pnls   = [t['pnl_pct'] for t in closed]\n    colors = [COLORS['buy'] if p > 0 else COLORS['sell'] for p in pnls]\n    ax_pnl.bar(range(len(pnls)), pnls, color=colors, alpha=0.8, width=0.6)\n    ax_pnl.axhline(0, color='#555', lw=0.8)\n    ax_pnl.set_ylabel('PnL %', color='#aaaaaa', fontsize=9)\n    ax_pnl.set_xlabel('Trade #', color='#aaaaaa', fontsize=9)\n    ax_pnl.set_title('Per-trade PnL', color='#aaaaaa', fontsize=9, pad=6)\n    ax_pnl.grid(alpha=0.1)\nelse:\n    ax_pnl.text(0.5, 0.5, 'No closed trades in this period.',\n                ha='center', va='center', color='#aaaaaa',\n                transform=ax_pnl.transAxes)\n\nplt.savefig('results.png', dpi=150, bbox_inches='tight', facecolor=fig.get_facecolor())\nplt.show()\nprint('Chart saved as results.png')"
  },
  {
   "cell_type": "markdown",
   "id": "md-16",
   "metadata": {},
   "source": "---\n## Try Different Tickers\n\nGo back to **Section 2 — Configuration** and change `SYMBOL` to any of these, then re-run all cells:\n\n| Ticker | Asset |\n|--------|-------|\n| `AAPL` | Apple |\n| `MSFT` | Microsoft |\n| `GOOGL` | Alphabet |\n| `TSLA` | Tesla |\n| `SPY` | S&P 500 ETF |\n| `GLD` | Gold ETF |\n| `BTC-USD` | Bitcoin |\n| `ETH-USD` | Ethereum |\n\nYou can also adjust `WINDOW` (try 10, 30, 50) and `Z_ENTRY` (try 1.5 or 2.5) to see how strategy performance changes."
